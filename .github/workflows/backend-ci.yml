name: Backend CI

on:
  push:
    branches: [main]
    paths: ["backend/**"]
  pull_request:
    paths: ["backend/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: blaze
          POSTGRES_USER: blaze
          POSTGRES_PASSWORD: ci-password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U blaze"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "true"
      POSTGRES_DB: blaze
      POSTGRES_USER: blaze
      POSTGRES_PASSWORD: ci-password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: flake8 .

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: pytest --cov=apps
