name: Android CI

on:
  push:
    branches: [main]
    paths: ["app/**", "gradle/**", "*.gradle.kts", "gradle.properties"]
  pull_request:
    paths: ["app/**", "gradle/**", "*.gradle.kts", "gradle.properties"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Unit tests
        run: gradle testDebugUnitTest --console=plain

      - name: Lint
        run: gradle lintDebug --console=plain
